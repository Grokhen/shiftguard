name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test backend
        run: npm run test --workspace backend

      - name: Build backend
        run: npm run build:backend

      - name: Lint frontend
        run: npm run lint:frontend

      - name: Build frontend
        run: npm run build:frontend
